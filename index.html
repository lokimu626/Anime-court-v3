<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANIME COURT v6.3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
    }
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .verdict-flash {
      animation: flash 0.3s ease-out;
    }
    @keyframes flash {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body class="min-h-screen">
  <div class="max-w-2xl mx-auto p-4">
    <!-- Header -->
    <div class="glass rounded-3xl p-6 mb-6 text-center">
      <h1 class="text-3xl font-extrabold mb-1">ANIME COURT ⚖️</h1>
      <p class="text-gray-400 text-sm">v6.3 • Argue your case</p>
      <div class="flex justify-center gap-6 mt-4 text-sm">
        <div><span class="text-teal-400 font-bold" id="totalCases">00</span> Cases</div>
        <div><span class="text-teal-400 font-bold" id="totalVotes">00</span> Votes</div>
        <div><span class="text-teal-400 font-bold" id="activeUsers">01</span> Online</div>
      </div>
    </div>

    <!-- Username -->
    <div class="glass rounded-2xl p-4 mb-6">
      <div class="flex items-center justify-between">
        <span class="text-sm text-gray-400">Filing as: <span id="usernameDisplay" class="text-teal-400 font-bold">@Anonymous</span></span>
        <div class="flex gap-2">
          <input type="text" id="usernameInput" placeholder="Set username" class="bg-black/30 border border-white/10 rounded-lg px-3 py-1 text-sm w-32 focus:outline-none focus:border-teal-400">
          <button onclick="setUsername()" class="bg-teal-500 hover:bg-teal-400 text-black font-bold px-3 py-1 rounded-lg text-sm">Set</button>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="flex mb-6 glass rounded-2xl p-1">
      <button id="courtroomTab" onclick="switchTab('courtroom')" class="flex-1 py-3 text-teal-400 border-b-2 border-teal-400 font-bold">Courtroom</button>
      <button id="fileTab" onclick="switchTab('file')" class="flex-1 py-3 text-gray-500 font-bold">File Case</button>
      <button id="recsTab" onclick="switchTab('recs')" class="flex-1 py-3 text-gray-500 font-bold">Recs</button>
    </div>

    <!-- Courtroom View -->
    <div id="courtroomView">
      <div class="flex gap-2 mb-4 overflow-x-auto pb-2">
        <button onclick="filterCategory('All')" class="category-btn bg-teal-500 text-black px-4 py-2 rounded-xl text-sm font-bold whitespace-nowrap">All</button>
        <button onclick="filterCategory('Hot Takes')" class="category-btn glass px-4 py-2 rounded-xl text-sm font-bold whitespace-nowrap">Hot Takes</button>
        <button onclick="filterCategory('Power Scaling')" class="category-btn glass px-4 py-2 rounded-xl text-sm font-bold whitespace-nowrap">Power Scaling</button>
        <button onclick="filterCategory('Adaptation')" class="category-btn glass px-4 py-2 rounded-xl text-sm font-bold whitespace-nowrap">Adaptation</button>
        <button onclick="filterCategory('Characters')" class="category-btn glass px-4 py-2 rounded-xl text-sm font-bold whitespace-nowrap">Characters</button>
      </div>
      <div id="casesList"></div>
    </div>

    <!-- File Case View -->
    <div id="fileView" class="hidden">
      <div class="glass rounded-2xl p-6">
        <h2 class="text-xl font-bold mb-4">File a New Case</h2>
        <input type="text" id="caseTitle" placeholder="Case title: 'Sakura was useless'" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 mb-3 focus:outline-none focus:border-teal-400">
        <textarea id="caseDesc" placeholder="Present your evidence..." rows="4" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 mb-3 focus:outline-none focus:border-teal-400"></textarea>
        <select id="caseCategory" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 mb-4 focus:outline-none focus:border-teal-400">
          <option>Hot Takes</option>
          <option>Power Scaling</option>
          <option>Adaptation</option>
          <option>Characters</option>
        </select>
        <button onclick="fileCase()" class="w-full bg-teal-500 hover:bg-teal-400 text-black font-bold py-3 rounded-xl">File Case</button>
      </div>
    </div>

    <!-- Recs View -->
    <div id="recsView" class="hidden">
      <div class="glass rounded-2xl p-6 mb-4">
        <h2 class="text-xl font-bold mb-4">Drop a Recommendation</h2>
        <input type="text" id="recTitle" placeholder="Anime name" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 mb-3 focus:outline-none focus:border-teal-400">
        <textarea id="recDesc" placeholder="Why it slaps..." rows="3" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 mb-4 focus:outline-none focus:border-teal-400"></textarea>
        <button onclick="fileRec()" class="w-full bg-teal-500 hover:bg-teal-400 text-black font-bold py-3 rounded-xl">Post Rec</button>
      </div>
      <div id="recsList"></div>
    </div>
  </div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getDatabase, ref, push, onValue, set, update } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCx11cXPbKVzO_bWCwCQVH6z_XkiAv2QCc",
    authDomain: "anime---court-11a28.firebaseapp.com",
    databaseURL: "https://anime---court-11a28-default-rtdb.firebaseio.com",
    projectId: "anime---court-11a28",
    storageBucket: "anime---court-11a28.firebasestorage.app",
    messagingSenderId: "30113651354",
    appId: "1:30113651354:web:38203b7ef5e971bebfdd23"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const casesRef = ref(db, 'cases');
  const usersRef = ref(db, 'users');
  const recsRef = ref(db, 'recommendations');
  const commentsRef = ref(db, 'comments');

  let currentUser = localStorage.getItem('courtUsername') || 'Anonymous';
  let currentFilter = 'All';
  let allCases = {};
  let allRecs = {};
  let allComments = {};
  let votedCases = JSON.parse(localStorage.getItem('votedCases') || '{}');

  document.getElementById('usernameDisplay').textContent = '@' + currentUser;
  document.getElementById('usernameInput').value = currentUser === 'Anonymous' ? '' : currentUser;

  window.setUsername = () => {
    const newName = document.getElementById('usernameInput').value.trim().replace(/[^a-zA-Z0-9_]/g, '');
    if (newName.length < 3) return alert('Username must be 3+ characters');
    currentUser = newName;
    localStorage.setItem('courtUsername', newName);
    document.getElementById('usernameDisplay').textContent = '@' + newName;
    set(ref(db, 'users/' + newName), { lastSeen: Date.now() });
  };

  window.switchTab = (tab) => {
    document.querySelectorAll('[id$="Tab"]').forEach(t => {
      t.classList.remove('text-teal-400', 'border-teal-400');
      t.classList.add('text-gray-500');
    });
    document.getElementById(tab + 'Tab').classList.add('text-teal-400', 'border-b-2', 'border-teal-400');
    document.getElementById(tab + 'Tab').classList.remove('text-gray-500');

    document.getElementById('courtroomView').classList.toggle('hidden', tab !== 'courtroom');
    document.getElementById('fileView').classList.toggle('hidden', tab !== 'file');
    document.getElementById('recsView').classList.toggle('hidden', tab !== 'recs');
  };

  window.filterCategory = (cat) => {
    currentFilter = cat;
    document.querySelectorAll('.category-btn').forEach(c => {
      c.classList.remove('bg-teal-500', 'text-black');
      c.classList.add('glass');
    });
    event.target.classList.add('bg-teal-500', 'text-black');
    event.target.classList.remove('glass');
    renderCases();
  };

  window.fileCase = () => {
    const title = document.getElementById('caseTitle').value.trim();
    const desc = document.getElementById('caseDesc').value.trim();
    const category = document.getElementById('caseCategory').value;
    if (!title || !desc) return alert('Fill all fields');
    if (currentUser === 'Anonymous') return alert('Set a username first');

    push(casesRef, {
      title, desc, category,
      author: currentUser,
      guiltyVotes: 0, notGuiltyVotes: 0,
      timestamp: Date.now()
    });

    document.getElementById('caseTitle').value = '';
    document.getElementById('caseDesc').value = '';
    switchTab('courtroom');
  };

  window.fileRec = () => {
    const title = document.getElementById('recTitle').value.trim();
    const desc = document.getElementById('recDesc').value.trim();
    if (!title || !desc) return alert('Fill all fields');
    if (currentUser === 'Anonymous') return alert('Set a username first');

    push(recsRef, { title, desc, author: currentUser, timestamp: Date.now() });
    document.getElementById('recTitle').value = '';
    document.getElementById('recDesc').value = '';
  };

  window.vote = (caseId, verdict) => {
    if (votedCases[caseId]) return;
    if (currentUser === 'Anonymous') return alert('Set a username first');

    const caseData = allCases[caseId];
    const updates = {};
    updates[`cases/${caseId}/${verdict}Votes`] = (caseData[verdict + 'Votes'] || 0) + 1;

    update(ref(db), updates);
    votedCases[caseId] = verdict;
    localStorage.setItem('votedCases', JSON.stringify(votedCases));

    showVerdict(caseId, verdict);
    setTimeout(renderCases, 350);
  };

  window.postComment = (caseId) => {
    if (currentUser === 'Anonymous') return alert('Set a username first');
    const input = document.getElementById(`comment-input-${caseId}`);
    const text = input.value.trim();
    if (!text) return;
    if (text.length > 300) return alert('Keep arguments under 300 chars');

    push(ref(db, `comments/${caseId}`), {
      text,
      author: currentUser,
      timestamp: Date.now()
    });
    input.value = '';
  };

  window.toggleComments = (caseId) => {
    document.getElementById(`comments-${caseId}`).classList.toggle('hidden');
  };

  function showVerdict(caseId, verdict) {
    const card = document.querySelector(`[data-case="${caseId}"]`);
    if (!card) return;
    const verdictEl = document.createElement('div');
    verdictEl.className = 'verdict-flash absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-5xl font-extrabold pointer-events-none';
    verdictEl.textContent = verdict === 'guilty' ? 'GUILTY' : 'NOT GUILTY';
    verdictEl.style.color = verdict === 'guilty' ? '#ef4444' : '#22c55e';
    card.appendChild(verdictEl);
    setTimeout(() => verdictEl.remove(), 300);
  }

  function renderCases() {
    const casesList = document.getElementById('casesList');
    const filtered = Object.entries(allCases).filter(([id, c]) =>
      currentFilter === 'All' || c.category === currentFilter
    ).sort((a, b) => b[1].timestamp - a[1].timestamp);

    if (filtered.length === 0) {
      casesList.innerHTML = '<div class="text-center text-gray-500 py-12">No cases filed. Be the first.</div>';
      return;
    }

    casesList.innerHTML = filtered.map(([id, c]) => {
      const hasVoted = votedCases[id];
      const author = c.author || 'Anonymous';
      const category = c.category || 'Hot Takes';
      const gVotes = c.guiltyVotes || 0;
      const ngVotes = c.notGuiltyVotes || 0;
      const caseComments = allComments[id] ? Object.entries(allComments[id]).sort((a,b) => a[1].timestamp - b[1].timestamp) : [];
      const commentCount = caseComments.length;

      return `
        <div class="glass rounded-2xl p-6 mb-4 relative" data-case="${id}">
          <div class="flex justify-between items-start mb-3">
            <div>
              <span class="text-teal-400 text-sm font-semibold">@${author}</span>
              <span class="ml-2 text-xs bg-black/30 px-2 py-1 rounded">${category}</span>
            </div>
          </div>
          <h3 class="text-xl font-bold mb-2">${escapeHtml(c.title)}</h3>
          <p class="text-gray-400 text-sm mb-5">${escapeHtml(c.desc)}</p>
          <div class="grid grid-cols-2 gap-3 mb-4">
            <button onclick="vote('${id}', 'guilty')" ${hasVoted ? 'disabled' : ''}
                    class="bg-red-500/20 hover:bg-red-500/30 border border-red-500/50 text-red-400 font-bold py-3 rounded-xl transition disabled:opacity-30 disabled:cursor-not-allowed">
              GUILTY ${gVotes}
            </button>
            <button onclick="vote('${id}', 'notGuilty')" ${hasVoted ? 'disabled' : ''}
                    class="bg-green-500/20 hover:bg-green-500/30 border border-green-500/50 text-green-400 font-bold py-3 rounded-xl transition disabled:opacity-30 disabled:cursor-not-allowed">
              NOT GUILTY ${ngVotes}
            </button>
          </div>
          
          <button onclick="toggleComments('${id}')" class="w-full glass hover:bg-white/10 border border-white/10 text-teal-400 text-sm font-semibold py-2 px-4 rounded-xl transition mb-4">
            Arguments (${commentCount}) ▼
          </button>
          
          <div id="comments-${id}" class="hidden">
            <div class="space-y-3 mb-4 max-h-60 overflow-y-auto pr-2">
              ${caseComments.map(([cid, com]) => `
                <div class="glass rounded-xl p-3 border border-white/5">
                  <div class="flex justify-between items-center mb-2">
                    <span class="text-teal-400 text-xs font-bold">@${com.author}</span>
                    <span class="text-gray-500 text-xs">${timeAgo(com.timestamp)}</span>
                  </div>
                  <p class="text-sm text-gray-200">${escapeHtml(com.text)}</p>
                </div>
              `).join('') || '<div class="text-gray-500 text-sm text-center py-4 glass rounded-xl">No arguments yet. Drop the first take.</div>'}
            </div>
            <div class="flex gap-2">
              <input type="text" id="comment-input-${id}" placeholder="Drop your argument..." maxlength="300"
                     class="flex-1 glass border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-teal-400 focus:ring-1 focus:ring-teal-400/50 transition">
              <button onclick="postComment('${id}')" class="bg-teal-500 hover:bg-teal-400 active:scale-95 text-black font-bold px-5 rounded-xl text-sm transition">
                Post
              </button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function renderRecs() {
    const recsList = document.getElementById('recsList');
    const sorted = Object.entries(allRecs).sort((a, b) => b[1].timestamp - a[1].timestamp);

    if (sorted.length === 0) {
      recsList.innerHTML = '<div class="text-center text-gray-500 py-12">No recommendations yet. Drop some heat.</div>';
      return;
    }

    recsList.innerHTML = sorted.map(([id, r]) => `
      <div class="glass rounded-2xl p-6 mb-4">
        <div class="flex justify-between items-start mb-3">
          <span class="text-teal-400 text-sm font-semibold">@${r.author || 'Anonymous'}</span>
          <span class="text-xs bg-black/30 px-2 py-1 rounded">Recommendation</span>
        </div>
        <h3 class="text-xl font-bold mb-2">${escapeHtml(r.title)}</h3>
        <p class="text-gray-400 text-sm">${escapeHtml(r.desc)}</p>
      </div>
    `).join('');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function timeAgo(timestamp) {
    const seconds = Math.floor((Date.now() - timestamp) / 1000);
    if (seconds < 60) return `${seconds}s ago`;
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `${minutes}m ago`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours}h ago`;
    const days = Math.floor(hours / 24);
    return `${days}d ago`;
  }

  onValue(casesRef, (snapshot) => {
    allCases = snapshot.val() || {};
    renderCases();
    document.getElementById('totalCases').textContent = Object.keys(allCases).length.toString().padStart(2, '0');
    const totalVotes = Object.values(allCases).reduce((sum, c) => sum + (c.guiltyVotes || 0) + (c.notGuiltyVotes || 0), 0);
    document.getElementById('totalVotes').textContent = totalVotes.toString().padStart(2, '0');
  });

  onValue(commentsRef, (snapshot) => {
    allComments = snapshot.val() || {};
    renderCases();
  });

  onValue(recsRef, (snapshot) => {
    allRecs = snapshot.val() || {};
    renderRecs();
  });

  onValue(usersRef, (snapshot) => {
    const users = snapshot.val() || {};
    const now = Date.now();
    const active = Object.values(users).filter(u => now - u.lastSeen < 300000).length;
    document.getElementById('activeUsers').textContent = Math.max(1, active).toString().padStart(2, '0');
  });

  setInterval(() => {
    if (currentUser !== 'Anonymous') {
      set(ref(db, 'users/' + currentUser + '/lastSeen'), Date.now());
    }
  }, 60000);
</script>
</body>
  </html>
