<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Court ⚖️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; }
       .card { transition: all 0.2s ease; }
       .card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-2xl">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold mb-2">⚖️ Anime Court</h1>
            <p class="text-gray-400">Anonymous arguments. Verdicts by the people.</p>
        </header>

        <div class="bg-gray-800 rounded-lg p-6 mb-6 card">
            <h2 class="text-xl font-bold mb-4">File a New Case</h2>
            <input id="caseTitle" type="text" placeholder="Case: Is One Piece too long?" 
                   class="w-full bg-gray-700 rounded p-3 mb-3 outline-none">
            <textarea id="caseDesc" placeholder="Your argument... Anonymous." 
                      class="w-full bg-gray-700 rounded p-3 mb-3 h-24 outline-none"></textarea>
            <button onclick="addCase()" class="w-full bg-purple-600 hover:bg-purple-700 rounded p-3 font-bold">
                Submit to Court
            </button>
        </div>

        <div id="cases" class="space-y-4">
            <!-- Cases appear here -->
        </div>
    </div>

    <script>
        let cases = JSON.parse(localStorage.getItem('animeCases') || '[]');
        
        function renderCases() {
            const container = document.getElementById('cases');
            container.innerHTML = cases.map((c, i) => `
                <div class="bg-gray-800 rounded-lg p-6 card">
                    <h3 class="text-lg font-bold mb-2">${c.title}</h3>
                    <p class="text-gray-300 mb-4">${c.desc}</p>
                    <div class="flex gap-3">
                        <button onclick="vote(${i}, 'guilty')" 
                                class="flex-1 bg-red-600/20 hover:bg-red-600/40 rounded p-2">
                            Guilty 👎 ${c.guilty || 0}
                        </button>
                        <button onclick="vote(${i}, 'innocent')" 
                                class="flex-1 bg-green-600/20 hover:bg-green-600/40 rounded p-2">
                            Innocent 👍 ${c.innocent || 0}
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        function addCase() {
            const title = document.getElementById('caseTitle').value;
            const desc = document.getElementById('caseDesc').value;
            if (!title ||!desc) return;
            
            cases.unshift({ title, desc, guilty: 0, innocent: 0 });
            localStorage.setItem('animeCases', JSON.stringify(cases));
            document.getElementById('caseTitle').value = '';
            document.getElementById('caseDesc').value = '';
            renderCases();
        }
        
        function vote(index, verdict) {
            cases[index][verdict]++;
            localStorage.setItem('animeCases', JSON.stringify(cases));
            renderCases();
        }
        
        // Starter case so it’s not empty
        if (cases.length === 0) {
            cases.push({
                title: "Case: Is Naruto a better MC than Luffy?",
                desc: "Anonymous plaintiff argues Naruto had better character development. Defense?",
                guilty: 12,
                innocent: 8
            });
        }
        
        renderCases();
    </script>
</body>
</html>
