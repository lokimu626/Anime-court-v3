<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Court V3</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #fff;
           margin: 0; padding: 20px; text-align: center; }
  .container { max-width: 600px; margin: 0 auto; }
    button { background: #7c3aed; color: white; border: none; padding: 12px 20px;
             margin: 8px; border-radius: 8px; font-size: 16px; cursor: pointer; }
    button:hover { background: #6d28d9; }
  .vibe-btn { background: #1f2937; }
  .vibe-btn.active { background: #7c3aed; box-shadow: 0 0 0 2px #a78bfa; }
  .card { background: #1f2937; padding: 24px; border-radius: 12px; margin: 20px 0;
            border: 1px solid #374151; }
  .actions { margin-top: 20px; }
  .next-btn { background: #059669; }
  .next-btn:hover { background: #047857; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Anime Court ⚖️</h1>
    <div id="app"></div>
    <div id="actions" class="actions"></div>
  </div>

  <script>
    const VIBES = ['Dark', 'Wholesome', 'Action', 'Romance', 'Comedy'];
    const ANIME_TAKES = [
      { title: 'Attack on Titan', text: 'Overrated and edgy for the sake of it' },
      { title: 'One Piece', text: 'Too long, will never finish' },
      { title: 'Demon Slayer', text: 'Carried by animation, mid story' },
      { title: 'Your Name', text: 'Pretty but emotionally manipulative' },
      { title: 'Naruto', text: 'Talk no Jutsu ruined every fight' },
      { title: 'Death Note', text: 'Fell off hard after L died' }
    ];

    let selectedVibes = [];
    let currentStep = 'select';
    let currentTakeIndex = 0;

    function render() {
      const app = document.getElementById('app');
      const actions = document.getElementById('actions');
      const currentTake = ANIME_TAKES[currentTakeIndex];

      if (currentStep === 'select') {
        app.innerHTML = `
          <h2>Pick your vibes:</h2>
          <div>
            ${VIBES.map(vibe => `
              <button class="vibe-btn ${selectedVibes.includes(vibe)? 'active' : ''}"
                onclick="toggleVibe('${vibe}')">${vibe}</button>
            `).join('')}
          </div>
          <button onclick="showVerdict()">Get Verdict →</button>
        `;
        actions.innerHTML = '';
      }

      if (currentStep === 'verdict') {
        app.innerHTML = `
          <div class="card">
            <h2>${currentTake.title}</h2>
            <p><em>"${currentTake.text}"</em></p>
            <p><strong>Your vibes:</strong> ${selectedVibes.join(', ')}</p>
            <p style="color: #9ca3af; font-size: 14px;">Case ${currentTakeIndex + 1} of ${ANIME_TAKES.length}</p>
          </div>
        `;
        actions.innerHTML = `
          <button onclick="handleChoice('defend')">[Defend]</button>
          <button onclick="handleChoice('prosecute')">[Prosecute]</button>
          <button class="next-btn" onclick="nextCase()">Next Case →</button>
          <button onclick="resetCourt()">← Change Vibes</button>
        `;
      }
    }

    function toggleVibe(vibe) {
      if (selectedVibes.includes(vibe)) {
        selectedVibes = selectedVibes.filter(v => v!== vibe);
      } else {
        selectedVibes.push(vibe);
      }
      render();
    }

    function showVerdict() {
      if (selectedVibes.length === 0) {
        alert('Pick at least one vibe first');
        return;
      }
      currentStep = 'verdict';
      render();
    }

    function handleChoice(choice) {
      alert(`You chose to ${choice.toUpperCase()}: ${ANIME_TAKES[currentTakeIndex].title}`);
    }

    function nextCase() {
      currentTakeIndex = (currentTakeIndex + 1) % ANIME_TAKES.length;
      render();
    }

    function resetCourt() {
      currentStep = 'select';
      render();
    }

    render();
  </script>
</body>
  </html>
